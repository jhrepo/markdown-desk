name: Tests

on:
  push:
    branches: [main]
  pull_request:

# The weekly "Check Submodule Update" workflow opens a PR (branch
# auto/submodule-update) whenever Markdown-Viewer ships a new Production
# deployment. `pull_request` makes this suite run on that PR automatically, so a
# submodule bump that breaks our DOM/contract coupling is caught here — by the
# STATIC contract test (tests/unit/submodule-contract.test.mjs) — instead of
# slipping through the PR's manual checklist. The BEHAVIORAL contracts
# (input→render, live-reload, …) live in e2e and are NOT run here (see the NOTE
# at the bottom); they stay a local pre-push gate, so the submodule-update PR
# body tells the reviewer to run `npm run test:e2e` before merging.

# macOS runner (matches release.yml): scripts/prepare-frontend.sh uses BSD
# `sed -i ''` and default_app.rs links macOS Launch Services, so the unit suite
# is exercised on the same platform we ship.

# Least privilege: this workflow only checks out and runs tests — no
# release uploads, no PR comments. GITHUB_TOKEN stays read-only even if a
# compromised dependency/action tries to use it. (Matches the explicit
# permissions convention submodule-update.yml already follows.)
permissions:
  contents: read

jobs:
  unit:
    name: Unit tests + coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive   # contract tests read Markdown-Viewer/ source

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      # This action selects the toolchain from its REF NAME (@stable); with a
      # SHA pin that signal is gone. This particular SHA (stable-branch HEAD)
      # happens to default to stable anyway, but the explicit input keeps the
      # selection correct no matter which SHA the pin moves to.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Prepare frontend (dist/) for generate_context!
        # cargo test compiles lib.rs's generate_context!(), which embeds ../dist
        # at build time — it must exist or the crate won't compile.
        run: TAURI_ENV_DEBUG=true sh scripts/prepare-frontend.sh

      - name: JS unit tests (incl. submodule static contract)
        run: node --test tests/unit/*.mjs

      - name: Rust unit tests
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml

      - name: Install tarpaulin
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-tarpaulin

      - name: Rust coverage gate (tarpaulin)
        # Ratchet, not a target. Current lib line coverage is ~38%; the rest is
        # AppHandle / OS glue (dialogs, eval, Launch Services) that is not
        # unit-testable and is covered by e2e / manual QA. 35 is a floor that
        # catches a real regression without flaking on measurement variance.
        # Raise it as pure-logic coverage grows.
        run: cargo tarpaulin --lib --manifest-path src-tauri/Cargo.toml --skip-clean --fail-under 35 --out Stdout

# NOTE: e2e (tests/e2e, WebdriverIO) is intentionally NOT run here. It needs a
# headed WKWebView and shares localStorage with any running prod app, so it
# stays a local pre-push gate (`npm run test:e2e`), per AGENTS.md Workflow Rules.
