name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 100

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build (aarch64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build (x86_64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Rename artifacts with architecture suffix
        run: |
          set -e
          for arch in aarch64 x86_64; do
            dir="src-tauri/target/${arch}-apple-darwin/release/bundle/macos"
            [ -f "${dir}/Markdown Desk.app.tar.gz" ] || { echo "ERROR: ${arch} artifact not found"; exit 1; }
            mv "${dir}/Markdown Desk.app.tar.gz" "${dir}/Markdown.Desk_${arch}.app.tar.gz"
            mv "${dir}/Markdown Desk.app.tar.gz.sig" "${dir}/Markdown.Desk_${arch}.app.tar.gz.sig"
          done

      - name: Get submodule version
        id: submodule
        run: |
          cd Markdown-Viewer
          COMMIT=$(git rev-parse --short HEAD)
          DESC=$(git describe --tags --always 2>/dev/null || echo "$COMMIT")
          echo "version=$DESC" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges --grep="^Markdown Desk v" --invert-grep)
          else
            LOG=$(git log --oneline --no-merges -20 --grep="^Markdown Desk v" --invert-grep)
          fi
          CHANGELOG=$(echo "$LOG" | sed 's/^[a-f0-9]* /- /')
          {
            echo "log<<ENDOFLOG"
            echo "$CHANGELOG"
            echo "ENDOFLOG"
          } >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          REPO=${{ github.repository }}
          TAG=${{ github.ref_name }}
          AARCH64_SIG=$(cat src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Markdown.Desk_aarch64.app.tar.gz.sig)
          X86_64_SIG=$(cat src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Markdown.Desk_x86_64.app.tar.gz.sig)
          NOTES="Markdown-Viewer: ${{ steps.submodule.outputs.version }}. See https://github.com/${REPO}/releases/tag/${TAG}"
          AARCH64_URL="https://github.com/${REPO}/releases/download/${TAG}/Markdown.Desk_aarch64.app.tar.gz"
          X86_64_URL="https://github.com/${REPO}/releases/download/${TAG}/Markdown.Desk_x86_64.app.tar.gz"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{\n  "version": "%s",\n  "notes": "%s",\n  "pub_date": "%s",\n  "platforms": {\n    "darwin-aarch64": {\n      "signature": "%s",\n      "url": "%s"\n    },\n    "darwin-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
            "$VERSION" "$NOTES" "$PUB_DATE" "$AARCH64_SIG" "$AARCH64_URL" "$X86_64_SIG" "$X86_64_URL" > latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## Release Notes
            ${{ steps.changelog.outputs.log }}


            **Markdown-Viewer**: `${{ steps.submodule.outputs.version }}` ([ThisIs-Developer/Markdown-Viewer@${{ steps.submodule.outputs.commit }}](https://github.com/ThisIs-Developer/Markdown-Viewer/commit/${{ steps.submodule.outputs.commit }}))
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Markdown.Desk_aarch64.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Markdown.Desk_aarch64.app.tar.gz.sig
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Markdown.Desk_x86_64.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Markdown.Desk_x86_64.app.tar.gz.sig
            latest.json
